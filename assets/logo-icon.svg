<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="physGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chemGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f0f1a"/>
  
  <!-- Outer orbit -->
  <ellipse cx="50" cy="50" rx="40" ry="40" fill="none" stroke="url(#physGrad)" stroke-width="3" opacity="0.4"/>
  <ellipse cx="50" cy="50" rx="40" ry="40" fill="none" stroke="url(#physGrad)" stroke-width="3" opacity="0.7" stroke-dasharray="80 40"/>
  
  <!-- Inner orbit -->
  <ellipse cx="50" cy="50" rx="30" ry="30" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5" transform="rotate(60 50 50)"/>
  
  <!-- Nucleus -->
  <circle cx="50" cy="50" r="15" fill="url(#physGrad)"/>
  <circle cx="50" cy="50" r="8" fill="url(#chemGrad2)"/>
  
  <!-- Hexagon -->
  <path d="M50 30 L68 40 L68 60 L50 70 L32 60 L32 40 Z" fill="none" stroke="url(#chemGrad2)" stroke-width="2" opacity="0.8"/>
  
  <!-- Electrons -->
  <circle cx="90" cy="50" r="5" fill="#22d3ee"/>
  <circle cx="50" cy="10" r="4" fill="#fbbf24"/>
  <circle cx="15" cy="75" r="4" fill="#f472b6"/>
</svg>