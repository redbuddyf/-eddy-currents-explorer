<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Physics gradient (purple) -->
    <linearGradient id="physicsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Chemistry gradient (green) -->
    <linearGradient id="chemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    
    <!-- Combined gradient -->
    <linearGradient id="combinedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#1a1a2e" stroke="#2d2d44" stroke-width="2"/>
  
  <!-- Atom nucleus (Physics) -->
  <circle cx="60" cy="60" r="12" fill="url(#physicsGrad)" filter="url(#glow)"/>
  
  <!-- Electron orbits (Physics) -->
  <ellipse cx="60" cy="60" rx="35" ry="35" fill="none" stroke="url(#physicsGrad)" stroke-width="2" opacity="0.6"/>
  <ellipse cx="60" cy="60" rx="35" ry="35" fill="none" stroke="url(#physicsGrad)" stroke-width="2" opacity="0.8" stroke-dasharray="60 30" transform="rotate(60 60 60)"/>
  <ellipse cx="60" cy="60" rx="25" ry="25" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" transform="rotate(120 60 60)"/>
  
  <!-- Electrons -->
  <circle cx="95" cy="60" r="4" fill="#22d3ee"/>
  <circle cx="60" cy="25" r="3" fill="#fbbf24"/>
  <circle cx="30" cy="80" r="3" fill="#f472b6"/>
  
  <!-- Hexagon molecule (Chemistry) overlay -->
  <path d="M60 38 L78 48 L78 68 L60 78 L42 68 L42 48 Z" fill="none" stroke="url(#chemGrad)" stroke-width="2" opacity="0.7"/>
  
  <!-- Connection lines between atoms (chemistry bonds) -->
  <line x1="60" y1="48" x2="60" y2="58" stroke="url(#chemGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="52" y1="54" x2="58" y2="60" stroke="url(#chemGrad)" stroke-width="2" opacity="0.8"/>
  <line x1="68" y1="54" x2="62" y2="60" stroke="url(#chemGrad)" stroke-width="2" opacity="0.8"/>
  
  <!-- Text: Science -->
  <text x="130" y="55" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="36" font-weight="700" fill="#f1f5f9">Science</text>
  
  <!-- Text: Unpacked with gradient -->
  <text x="130" y="90" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="36" font-weight="700" fill="url(#combinedGrad)">Unpacked</text>
  
  <!-- Tagline -->
  <text x="130" y="108" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">Physics &amp; Chemistry Education</text>
</svg>